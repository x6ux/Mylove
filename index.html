<!DOCTYPE html>
<html lang="ar" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chat</title>
  <style>
    /* إخفاء أسهم الزيادة والنقصان في حقول الإدخال */
    /* Chrome, Safari, Edge, Opera */
    input::-webkit-outer-spin-button,
    input::-webkit-inner-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }

    /* Firefox */
    input[type=number] {
      -moz-appearance: textfield;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #000; --bg-surface: #1c1c1c; --bg-elevated: #262626;
      --border: #363636; --text: #f5f5f5; --text2: #a8a8a8;
      --text3: #6b6b6b; --bubble-them: #262626; --bubble-me: #0095f6;
      --hover: #1a1a1a; --online: #0095f6;
    }
    body { font-family: -apple-system, sans-serif; background: var(--bg); height: 100dvh; display: flex; flex-direction: column; align-items: center; justify-content: center; }

    /* LOGIN */
    .login-screen { width: 100%; max-width: 360px; padding: 40px 32px; display: flex; flex-direction: column; gap: 16px; background: var(--bg-surface); border-radius: 12px; border: 1px solid var(--border); }
    .login-screen h2 { font-size: 22px; font-weight: 600; color: var(--text); text-align: center; }
    .login-screen input { width: 100%; background: var(--bg-elevated); border: 1px solid var(--border); border-radius: 8px; padding: 10px 14px; color: var(--text); outline: none; }
    .login-btn { width: 100%; background: #0095f6; border: none; border-radius: 8px; padding: 11px; font-weight: 600; color: #fff; cursor: pointer; }

    /* AVATAR UPLOAD in login */
    .avatar-upload-wrap { display: flex; flex-direction: column; align-items: center; gap: 8px; }
    .avatar-upload-circle { width: 80px; height: 80px; border-radius: 50%; background: var(--bg-elevated); border: 2px dashed var(--border); cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--text2); font-size: 28px; overflow: hidden; position: relative; transition: border-color .2s; }
    .avatar-upload-circle:hover { border-color: var(--online); }
    .avatar-upload-circle img { width: 100%; height: 100%; object-fit: cover; }
    .avatar-upload-circle input[type=file] { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
    .avatar-upload-label { font-size: 12px; color: var(--text2); }

    /* APP */
    .app { display: none; width: 100%; max-width: 960px; height: 100dvh; background: var(--bg); border-left: 1px solid var(--border); border-right: 1px solid var(--border); }
    .wrap { display: flex; height: 100%; }
    .sidebar { width: 300px; border-right: 1px solid var(--border); display: flex; flex-direction: column; }
    .sb-top { padding: 14px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
    .sb-username { font-size: 15px; font-weight: 600; color: var(--text); }
    .my-avatar-sb { width: 34px; height: 34px; border-radius: 50%; object-fit: cover; background: var(--bg-elevated); cursor: pointer; border: 2px solid var(--border); flex-shrink: 0; display: flex; align-items: center; justify-content: center; color: var(--online); font-weight: bold; font-size: 14px; overflow: hidden; }
    .my-avatar-sb img { width: 100%; height: 100%; object-fit: cover; }
    .search-wrap { padding: 8px 10px; border-bottom: 1px solid var(--border); }
    .search-wrap input { width: 100%; background: var(--bg-elevated); border: none; border-radius: 8px; padding: 7px 12px; color: var(--text); outline: none; }
    .users-list { flex: 1; overflow-y: auto; }
    .user-item { display: flex; align-items: center; gap: 10px; padding: 10px 14px; cursor: pointer; }
    .user-item:hover, .user-item.active { background: var(--hover); }
    .avatar { width: 48px; height: 48px; border-radius: 50%; display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; flex-shrink: 0; }
    .avatar img { width: 100%; height: 100%; object-fit: cover; }
    .online-ring { position: absolute; bottom: 1px; right: 1px; width: 11px; height: 11px; border-radius: 50%; background: var(--online); border: 2px solid var(--bg); z-index: 2; }
    
    /* UNREAD BADGE */
    .unread-badge { background: #ff3b30; color: white; font-size: 11px; font-weight: bold; padding: 2px 7px; border-radius: 10px; min-width: 18px; text-align: center; margin-right: auto; }

    /* NOTIFICATION TOAST */
    .push-notif { position: fixed; top: 20px; left: 20px; background: var(--bg-surface); border: 1px solid var(--border); padding: 12px 16px; border-radius: 12px; display: flex; align-items: center; gap: 10px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); z-index: 1000; animation: slideIn 0.3s ease-out; cursor: pointer; max-width: 250px; }
    @keyframes slideIn { from { transform: translateX(-100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

    .chat-area { flex: 1; display: flex; flex-direction: column; min-width: 0; }
    .chat-header { padding: 11px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 10px; }
    .messages { flex: 1; overflow-y: auto; padding: 16px 14px; display: flex; flex-direction: column; gap: 6px; }
    .msg-row { display: flex; align-items: flex-end; gap: 6px; }
    .msg-row.me { flex-direction: row-reverse; }
    .bubble { max-width: 68%; padding: 9px 13px; font-size: 14px; border-radius: 18px; word-break: break-word; }
    .bubble.them { background: var(--bubble-them); color: var(--text); border-bottom-left-radius: 4px; }
    .bubble.me { background: var(--bubble-me); color: #fff; border-bottom-right-radius: 4px; }
    .bubble.img-bubble { padding: 3px; background: transparent; }
    .bubble.img-bubble img { max-width: 220px; border-radius: 14px; display: block; }
    .bubble.voice-bubble { display: flex; align-items: center; gap: 8px; min-width: 160px; }
    .voice-play-btn { width: 32px; height: 32px; border-radius: 50%; background: rgba(255,255,255,.15); border: none; cursor: pointer; color: #fff; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .voice-wave { flex: 1; height: 28px; display: flex; align-items: center; gap: 1.5px; }
    .voice-bar { width: 3px; background: rgba(255,255,255,.5); border-radius: 2px; animation: none; }
    .voice-duration { font-size: 11px; opacity: .8; }
    .input-area { padding: 10px 12px; border-top: 1px solid var(--border); display: flex; gap: 6px; align-items: flex-end; position: relative; }
    .msg-input { flex: 1; border-radius: 20px; padding: 9px 14px; background: var(--bg-surface); color: var(--text); border: 1px solid var(--border); outline: none; resize: none; max-height: 80px; font-size: 14px; }
    .send-btn { background: none; border: none; color: var(--online); font-weight: 600; cursor: pointer; padding: 4px; }
    .icon-btn { background: none; border: none; color: var(--text2); cursor: pointer; padding: 4px; flex-shrink: 0; display: flex; align-items: center; }
    .icon-btn:hover { color: var(--text); }

    /* EMOJI PICKER */
    .emoji-picker { position: absolute; bottom: 65px; left: 12px; width: 300px; background: var(--bg-elevated); border: 1px solid var(--border); border-radius: 12px; padding: 10px; z-index: 100; display: none; box-shadow: 0 8px 30px rgba(0,0,0,.6); }
    .emoji-picker.open { display: block; }
    .emoji-categories { display: flex; gap: 4px; margin-bottom: 8px; flex-wrap: wrap; }
    .emoji-cat-btn { background: none; border: none; font-size: 16px; cursor: pointer; padding: 4px 6px; border-radius: 6px; opacity: .6; }
    .emoji-cat-btn:hover, .emoji-cat-btn.active { background: var(--border); opacity: 1; }
    .emoji-search { width: 100%; background: var(--bg-surface); border: 1px solid var(--border); border-radius: 8px; padding: 6px 10px; color: var(--text); outline: none; font-size: 13px; margin-bottom: 8px; }
    .emoji-grid { display: grid; grid-template-columns: repeat(8, 1fr); gap: 2px; max-height: 180px; overflow-y: auto; }
    .emoji-btn { background: none; border: none; font-size: 20px; cursor: pointer; padding: 4px; border-radius: 6px; text-align: center; line-height: 1; }
    .emoji-btn:hover { background: var(--border); }

    /* MODALS */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.85); z-index: 200; display: none; align-items: center; justify-content: center; }
    .modal-overlay.open { display: flex; }
    .camera-modal, .profile-modal { background: var(--bg-surface); border-radius: 16px; padding: 20px; width: 340px; display: flex; flex-direction: column; gap: 14px; border: 1px solid var(--border); }
    .camera-modal h3, .profile-modal h3 { color: var(--text); font-size: 16px; font-weight: 600; text-align: center; }
    #cameraPreview { width: 100%; border-radius: 10px; background: #000; display: block; }
    .cam-btn { padding: 8px 20px; border-radius: 8px; border: none; cursor: pointer; font-weight: 600; }
    .cam-btn.primary { background: var(--online); color: #fff; }
    .cam-btn.secondary { background: var(--bg-elevated); color: var(--text); }
    #captureCanvas { display: none; }

    /* RECORDING BAR */
    .recording-bar { position: absolute; bottom: 65px; left: 12px; right: 12px; background: #1a1a2e; border: 1px solid #0095f6; border-radius: 20px; padding: 10px 16px; display: none; align-items: center; gap: 10px; z-index: 50; }
    .recording-bar.active { display: flex; }
    .rec-dot { width: 10px; height: 10px; border-radius: 50%; background: #ff4444; animation: blink 1s infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.2} }
    .rec-time { color: var(--text); font-size: 14px; flex: 1; }

    @media(max-width:640px) {
      .sidebar.hidden, .chat-area.hidden { display: none; }
      .emoji-picker { width: calc(100vw - 24px); }
    }
  </style>
</head>
<body>

<div class="login-screen" id="loginScreen">
  <h2>Chat</h2>
  <div class="avatar-upload-wrap">
    <div class="avatar-upload-circle" id="loginAvatarCircle">
      <span id="loginAvatarIcon">📷</span>
      <img id="loginAvatarPreview" style="display:none; position:absolute; inset:0; width:100%; height:100%; object-fit:cover; border-radius:50%;">
      <input type="file" accept="image/*" id="loginAvatarInput">
    </div>
  </div>
  <input type="text" id="nameInput" placeholder="Your name" maxlength="20">
  <button class="login-btn" id="loginBtn">Start chatting</button>
</div>

<div class="app" id="app">
  <div class="wrap">
    <div class="sidebar" id="sidebar">
      <div class="sb-top">
        <div style="display:flex; align-items:center; gap:8px;">
          <div class="my-avatar-sb" id="myAvatarSb" onclick="openProfileModal()"></div>
          <span class="sb-username" id="myNameLabel"></span>
        </div>
        <button class="icon-btn" id="logoutBtn"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg></button>
      </div>
      <div class="search-wrap"><input type="text" id="searchInput" placeholder="Search users" oninput="filterUsers()"></div>
      <div class="users-list" id="usersList"></div>
    </div>

    <div class="chat-area" id="chatArea">
      <div id="emptyChat" style="flex:1; display:flex; align-items:center; justify-content:center; color:var(--text2);">Select someone to chat with</div>
      <div id="chatView" style="display:none; flex-direction:column; flex:1; min-height:0;">
        <div class="chat-header">
          <button class="icon-btn" id="backBtn" style="display:none;"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M15 18l-6-6 6-6"/></svg></button>
          <div class="avatar" id="chatAvatar" style="width:38px; height:38px;"></div>
          <div>
            <div id="chatName" style="font-weight:600; font-size:14px; color:var(--text);"></div>
            <div style="font-size:11px; color:var(--online);">Active now</div>
          </div>
        </div>
        <div class="messages" id="messages"></div>
        <div class="input-area">
          <button class="icon-btn" id="emojiToggleBtn" onclick="toggleEmojiPicker()"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="10"/><path d="M8 13s1.5 2 4 2 4-2 4-2"/><line x1="9" y1="9" x2="9.01" y2="9"/><line x1="15" y1="9" x2="15.01" y2="9"/></svg></button>
          <textarea class="msg-input" id="msgInput" placeholder="Message..." rows="1"></textarea>
          <button class="send-btn" id="sendBtn" style="display:none" onclick="sendMsg()"><svg width="22" height="22" viewBox="0 0 24 24" fill="#0095f6"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg></button>
        </div>
      </div>
    </div>
  </div>
</div>
