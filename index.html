<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chat Pro</title>
  <style>
    /* التنسيقات الأساسية */
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #000; --bg-surface: #1c1c1c; --border: #363636;
      --text: #f5f5f5; --text2: #a8a8a8; --online: #0095f6;
    }
    body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); height: 100dvh; overflow: hidden; }

    /* الشاشات */
    .login-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; gap: 15px; }
    .app { display: none; height: 100%; display: flex; }
    
    /* نظام الاتصال - واجهة منبثقة */
    .call-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 999; display: none; flex-direction: column; align-items: center; justify-content: center; gap: 20px; }
    .call-avatar { width: 120px; height: 120px; border-radius: 50%; border: 3px solid var(--online); }
    
    /* حالة الرسائل */
    .msg-status { font-size: 10px; color: var(--text2); margin-top: 2px; text-align: right; }
    .me .msg-status { text-align: left; }

    /* الهيدر مع زر الاتصال */
    .chat-header { padding: 12px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
    .header-info { display: flex; align-items: center; gap: 10px; }
    
    /* التنسيقات المتبقية مشابهة لطلبك لضمان النظافة */
    .sidebar { width: 300px; border-left: 1px solid var(--border); }
    .chat-area { flex: 1; display: flex; flex-direction: column; }
    .messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
    .input-area { padding: 15px; border-top: 1px solid var(--border); display: flex; gap: 10px; }
    input, textarea { background: var(--bg-surface); border: 1px solid var(--border); color: #fff; padding: 10px; border-radius: 8px; }
  </style>
</head>
<body>

<div id="loginScreen" class="login-screen">
  <h2>تسجيل الدخول</h2>
  <input type="text" id="nameInput" placeholder="ادخل اسمك...">
  <button onclick="login()" style="background:var(--online); border:none; padding:10px 20px; color:#fff; border-radius:8px;">دخول</button>
</div>

<div id="app" class="app" style="display:none;">
  <div class="sidebar">
    <div style="padding:15px; border-bottom:1px solid var(--border);">المحادثات</div>
    <div id="usersList"></div>
  </div>
  <div class="chat-area">
    <div id="chatHeader" class="chat-header" style="display:none;">
      <div class="header-info">
        <div id="chatName"></div>
      </div>
      <button onclick="startCall()" style="background:none; border:none; color:var(--online); cursor:pointer;">
        <svg width="24" height="24" fill="currentColor" viewBox="0 0 24 24"><path d="M20 15.5c-1.2 0-2.4-.2-3.6-.6-.3-.1-.7 0-1 .2l-2.2 2.2c-2.8-1.4-5.1-3.8-6.6-6.6l2.2-2.2c.3-.3.4-.7.2-1-.3-1.1-.5-2.3-.5-3.5 0-.6-.4-1-1-1H4c-.6 0-1 .4-1 1 0 9.4 7.6 17 17 17 .6 0 1-.4 1-1v-3.5c0-.6-.4-1-1-1z"/></svg>
      </button>
    </div>
    <div id="messages" class="messages"></div>
    <div class="input-area">
      <input type="text" id="msgInput" style="flex:1" placeholder="اكتب رسالة...">
      <button onclick="sendMsg()" style="background:var(--online); border:none; padding:0 15px; color:#fff; border-radius:8px;">إرسال</button>
    </div>
  </div>
</div>

<div id="callOverlay" class="call-overlay">
  <div id="callStatus" style="font-size: 18px;">جاري الاتصال...</div>
  <div class="call-avatar" id="callUserAvatar"></div>
  <div id="callUserName" style="font-weight: bold;"></div>
  <button onclick="endCall()" style="background:#ff4444; border:none; padding:15px 30px; color:#fff; border-radius:30px;">إنهاء المكالمة</button>
  <audio id="remoteAudio" autoplay></audio>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, collection, doc, setDoc, onSnapshot, addDoc, query, orderBy, serverTimestamp, updateDoc, where, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCGESu1mlPYGthb3ibL6PdD5HpgdjaleF8",
    authDomain: "myloves-ce43d.firebaseapp.com",
    projectId: "myloves-ce43d",
    storageBucket: "myloves-ce43d.firebasestorage.app",
    messagingSenderId: "547760347659",
    appId: "1:547760347659:web:943ef1d86577549ab9c50e"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  let myId = localStorage.getItem('chat_myId') || '';
  let myName = localStorage.getItem('chat_myName') || '';
  let activeUserId = null;
  let peerConnection = null;

  // --- نظام التنبيهات ---
  if (Notification.permission !== 'granted') Notification.requestPermission();

  window.login = async () => {
    const name = document.getElementById('nameInput').value;
    if(!name) return;
    myId = name.toLowerCase() + "_" + Math.floor(Math.random()*1000);
    myName = name;
    localStorage.setItem('chat_myId', myId);
    localStorage.setItem('chat_myName', myName);
    await setDoc(doc(db, 'users', myId), { name: myName, id: myId, online: true });
    location.reload();
  };

  if(myId) {
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('app').style.display = 'flex';
    loadUsers();
    listenForCalls();
  }

  function loadUsers() {
    onSnapshot(collection(db, 'users'), snap => {
      const list = document.getElementById('usersList');
      list.innerHTML = '';
      snap.forEach(d => {
        if(d.id === myId) return;
        const u = d.data();
        const div = document.createElement('div');
        div.style.padding = '10px'; div.style.cursor = 'pointer';
        div.innerText = u.name;
        div.onclick = () => openChat(u.id, u.name);
        list.appendChild(div);
      });
    });
  }

  async function openChat(id, name) {
    activeUserId = id;
    document.getElementById('chatHeader').style.display = 'flex';
    document.getElementById('chatName').innerText = name;
    
    const chatId = [myId, id].sort().join('_');
    
    // التسمية بـ Seen عند فتح المحادثة
    onSnapshot(query(collection(db, 'chats', chatId, 'messages'), orderBy('timestamp')), snap => {
      const box = document.getElementById('messages');
      box.innerHTML = '';
      snap.forEach(async d => {
        const m = d.data();
        // تحديث الحالة إلى Seen إذا كنت أنا المستلم والرسالة Sent
        if(m.senderId !== myId && m.status === 'sent') {
          await updateDoc(doc(db, 'chats', chatId, 'messages', d.id), { status: 'seen' });
        }
        
        const div = document.createElement('div');
        div.className = m.senderId === myId ? 'me' : 'them';
        div.innerHTML = `
          <div style="background:${m.senderId === myId ? '#0095f6' : '#262626'}; padding:8px 12px; border-radius:12px; max-width:70%;">
            ${m.text}
            <div class="msg-status">${m.senderId === myId ? (m.status === 'seen' ? 'Seen' : 'Sent') : ''}</div>
          </div>
        `;
        box.appendChild(div);
      });
      box.scrollTop = box.scrollHeight;
    });
  }

  window.sendMsg = async () => {
    const text = document.getElementById('msgInput').value;
    if(!text || !activeUserId) return;
    const chatId = [myId, activeUserId].sort().join('_');
    document.getElementById('msgInput').value = '';
    
    await addDoc(collection(db, 'chats', chatId, 'messages'), {
      text, senderId: myId, status: 'sent', timestamp: serverTimestamp()
    });
  };

  // --- نظام الاتصال الصوتي المبسط (WebRTC Logic) ---
  window.startCall = async () => {
    document.getElementById('callOverlay').style.display = 'flex';
    document.getElementById('callUserName').innerText = activeUserId;
    
    peerConnection = new RTCPeerConnection();
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    stream.getTracks().forEach(track => peerConnection.addTrack(track, stream));

    const offer = await peerConnection.createOffer();
    await peerConnection.setLocalDescription(offer);

    await setDoc(doc(db, 'calls', activeUserId), {
      offer, caller: myId, callerName: myName, type: 'incoming'
    });
  };

  function listenForCalls() {
    onSnapshot(doc(db, 'calls', myId), async (snap) => {
      if (snap.exists() && snap.data().type === 'incoming') {
        const data = snap.data();
        if(confirm(`مكالمة واردة من ${data.callerName}.. هل تقبل؟`)) {
          document.getElementById('callOverlay').style.display = 'flex';
          // منطق الرد هنا (تبادل الـ ICE Candidates والـ Answer)
          // ملاحظة: للإنتاج الفعلي يفضل استخدام مكتبة مثل Agora أو Twilio أو إكمال بروتوكول Signaling
          alert("تم قبول الاتصال (نظام Signaling قيد التوصيل)");
        }
      }
    });
  }

  window.endCall = () => {
    document.getElementById('callOverlay').style.display = 'none';
    if(peerConnection) peerConnection.close();
  };

</script>
</body>
</html>
