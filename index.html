<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chat App - Instagram Style</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #000; --bg-surface: #1c1c1c; --bg-elevated: #262626;
      --border: #363636; --text: #f5f5f5; --text2: #a8a8a8;
      --text3: #6b6b6b; --bubble-them: #262626; --bubble-me: #0095f6;
      --hover: #1a1a1a; --online: #0095f6;
    }
    body { font-family: -apple-system, sans-serif; background: var(--bg); height: 100dvh; display: flex; flex-direction: column; align-items: center; justify-content: center; overflow: hidden; }

    /* LOGIN */
    .login-screen { width: 100%; max-width: 360px; padding: 40px 32px; display: flex; flex-direction: column; gap: 16px; background: var(--bg-surface); border-radius: 12px; border: 1px solid var(--border); }
    .login-screen h2 { font-size: 22px; font-weight: 600; color: var(--text); text-align: center; }
    .login-screen input { width: 100%; background: var(--bg-elevated); border: 1px solid var(--border); border-radius: 8px; padding: 10px 14px; color: var(--text); outline: none; text-align: center; }
    .login-btn { width: 100%; background: #0095f6; border: none; border-radius: 8px; padding: 11px; font-weight: 600; color: #fff; cursor: pointer; }

    /* AVATAR UPLOAD */
    .avatar-upload-wrap { display: flex; flex-direction: column; align-items: center; gap: 8px; }
    .avatar-upload-circle { width: 80px; height: 80px; border-radius: 50%; background: var(--bg-elevated); border: 2px dashed var(--border); cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--text2); font-size: 28px; overflow: hidden; position: relative; }
    .avatar-upload-circle img { width: 100%; height: 100%; object-fit: cover; }
    .avatar-upload-circle input[type=file] { position: absolute; inset: 0; opacity: 0; cursor: pointer; }

    /* APP STRUCTURE */
    .app { display: none; width: 100%; max-width: 960px; height: 100dvh; background: var(--bg); border-left: 1px solid var(--border); border-right: 1px solid var(--border); }
    .wrap { display: flex; height: 100%; }
    .sidebar { width: 300px; border-left: 1px solid var(--border); display: flex; flex-direction: column; }
    .sb-top { padding: 14px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
    .sb-username { font-size: 15px; font-weight: 600; color: var(--text); }
    .my-avatar-sb { width: 34px; height: 34px; border-radius: 50%; background: var(--bg-elevated); cursor: pointer; border: 2px solid var(--border); overflow: hidden; display: flex; align-items: center; justify-content: center; }
    .my-avatar-sb img { width: 100%; height: 100%; object-fit: cover; }
    
    .search-wrap { padding: 8px 10px; border-bottom: 1px solid var(--border); }
    .search-wrap input { width: 100%; background: var(--bg-elevated); border: none; border-radius: 8px; padding: 7px 12px; color: var(--text); outline: none; }
    
    .users-list { flex: 1; overflow-y: auto; }
    .user-item { display: flex; align-items: center; gap: 12px; padding: 12px 14px; cursor: pointer; transition: 0.2s; }
    .user-item:hover, .user-item.active { background: var(--hover); }
    
    .avatar { width: 48px; height: 48px; border-radius: 50%; position: relative; flex-shrink: 0; display: flex; align-items: center; justify-content: center; background: #262626; }
    .avatar img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; }
    .online-ring { position: absolute; bottom: 2px; right: 2px; width: 12px; height: 12px; border-radius: 50%; background: #4cd964; border: 2px solid var(--bg); }

    /* UNREAD BADGE */
    .unread-badge { background: #ff3b30; color: white; font-size: 11px; font-weight: bold; padding: 2px 7px; border-radius: 10px; min-width: 18px; text-align: center; margin-right: auto; }
    
/* إزالة الخلفية البيضاء من الأفاتار وأي عناصر دائرية */
.avatar, .my-avatar-sb, .avatar-upload-circle {
    background-color: transparent !important; /* جعل الخلفية شفافة */
    background: var(--bg-elevated); /* أو استخدام لون التصميم الداكن */
    border: 1px solid var(--border); /* حدود متناسقة بدلاً من الأبيض */
}

/* التأكد من أن الصور تغطي المساحة بالكامل بدون ترك حواف بيضاء */
.avatar img, .my-avatar-sb img, .avatar-upload-circle img {
    background-color: transparent;
    display: block;
    object-fit: cover; /* لضمان عدم وجود فراغات */
}

/* إذا كان اللون الأبيض يظهر عند اختيار "ملف" أو رفع صورة */
input[type="file"] {
    background: none !important;
}

/* تعديل خلفية أيقونة الكاميرا الافتراضية لتكون داكنة */
#loginAvatarIcon {
    color: var(--text2);
    background: transparent;
}
    /* NOTIFICATION TOAST */
    .push-notif { position: fixed; top: 20px; left: 20px; background: var(--bg-surface); border: 1px solid var(--border); padding: 12px 16px; border-radius: 12px; display: flex; align-items: center; gap: 10px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); z-index: 1000; animation: slideIn 0.3s ease-out; cursor: pointer; max-width: 250px; }
    @keyframes slideIn { from { transform: translateX(-100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

    .chat-area { flex: 1; display: flex; flex-direction: column; min-width: 0; }
    .chat-header { padding: 11px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 12px; }
    .messages { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 8px; }
    
    .msg-row { display: flex; align-items: flex-end; gap: 8px; }
    .msg-row.me { flex-direction: row-reverse; }
    .bubble { max-width: 70%; padding: 9px 14px; font-size: 14px; border-radius: 18px; line-height: 1.4; word-break: break-word; }
    .bubble.them { background: var(--bubble-them); color: var(--text); border-bottom-right-radius: 4px; }
    .bubble.me { background: var(--bubble-me); color: #fff; border-bottom-left-radius: 4px; }

    .input-area { padding: 12px; border-top: 1px solid var(--border); display: flex; gap: 10px; align-items: center; }
    .msg-input { flex: 1; border-radius: 20px; padding: 10px 16px; background: var(--bg-surface); color: var(--text); border: 1px solid var(--border); outline: none; resize: none; max-height: 100px; }
    .send-btn { background: none; border: none; color: var(--online); font-weight: 700; cursor: pointer; display: none; }
    .icon-btn { background: none; border: none; color: var(--text2); cursor: pointer; display: flex; align-items: center; }

    @media(max-width: 640px) {
      .sidebar.hidden { display: none; }
      .chat-area.hidden { display: none; }
      .sidebar { width: 100%; border: none; }
    }
  </style>
</head>
<body>

<div class="login-screen" id="loginScreen">
  <h2>Chat App</h2>
  <div class="avatar-upload-wrap">
    <div class="avatar-upload-circle">
      <span id="loginAvatarIcon">📷</span>
      <img id="loginAvatarPreview" style="display:none;">
      <input type="file" accept="image/*" id="loginAvatarInput">
    </div>
  </div>
  <input type="text" id="nameInput" placeholder="ادخل اسمك هنا" maxlength="20">
  <button class="login-btn" id="loginBtn">دخول</button>
</div>

<div class="app" id="app">
  <div class="wrap">
    <div class="sidebar" id="sidebar">
      <div class="sb-top">
        <div class="my-avatar-sb" onclick="openProfileModal()" id="myAvatarSb"></div>
        <span class="sb-username" id="myNameLabel"></span>
        <button class="icon-btn" id="logoutBtn">🚪</button>
      </div>
      <div class="search-wrap">
        <input type="text" placeholder="بحث عن أشخاص..." id="searchInput" oninput="filterUsers()">
      </div>
      <div class="users-list" id="usersList"></div>
    </div>

    <div class="chat-area hidden" id="chatArea">
      <div id="chatView" style="display:none; flex-direction:column; height:100%;">
        <div class="chat-header">
          <button class="icon-btn" id="backBtn">➡️</button>
          <div class="avatar" id="chatAvatar"></div>
          <div>
            <div id="chatName" style="font-weight:600; font-size:15px;"></div>
            <div style="font-size:11px; color:#4cd964;">نشط الآن</div>
          </div>
        </div>
        <div class="messages" id="messages"></div>
        <div class="input-area">
          <textarea class="msg-input" id="msgInput" placeholder="رسالة..." rows="1"></textarea>
          <button class="send-btn" id="sendBtn" onclick="sendMsg()">إرسال</button>
        </div>
      </div>
      <div id="emptyChat" style="flex:1; display:flex; align-items:center; justify-content:center; color:var(--text2);">
        اختر شخصاً لبدء الدردشة
      </div>
    </div>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, collection, doc, setDoc, onSnapshot, addDoc, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  // إعدادات Firebase (استخدم إعداداتك الخاصة هنا)
  const firebaseConfig = {
    apiKey: "AIzaSyCGESu1mlPYGthb3ibL6PdD5HpgdjaleF8",
    authDomain: "myloves-ce43d.firebaseapp.com",
    projectId: "myloves-ce43d",
    storageBucket: "myloves-ce43d.firebasestorage.app",
    messagingSenderId: "547760347659",
    appId: "1:547760347659:web:943ef1d86577549ab9c50e"
  };

  const firebaseApp = initializeApp(firebaseConfig);
  const db = getFirestore(firebaseApp);

  let myName = '', myId = '', myAvatar = '';
  let activeUserId = null;
  let unsubMessages = null;
  let allUsers = [];
  let unreadCounts = {}; // لتخزين عدد الرسائل غير المقروءة لكل مستخدم

  // --- تفعيل الدخول ---
  document.getElementById('loginBtn').onclick = async () => {
    const name = document.getElementById('nameInput').value.trim();
    if (!name) return alert("يرجى إدخال الاسم");
    
    myId = name.toLowerCase().replace(/\s/g, '_') + '_' + Math.floor(Math.random()*1000);
    myName = name;
    myAvatar = document.getElementById('loginAvatarPreview').src || '';
    
    localStorage.setItem('chat_myId', myId);
    localStorage.setItem('chat_myName', myName);
    localStorage.setItem('chat_myAvatar', myAvatar);
    
    await updateStatus(true);
    showApp();
  };

  async function updateStatus(online) {
    if (!myId) return;
    await setDoc(doc(db, 'users', myId), {
      name: myName, id: myId, avatar: myAvatar, online: online, lastSeen: serverTimestamp()
    }, { merge: true });
  }

  function showApp() {
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    document.getElementById('myNameLabel').textContent = myName;
    if (myAvatar) document.getElementById('myAvatarSb').innerHTML = `<img src="${myAvatar}">`;
    startListeningUsers();
    startGlobalListener(); // تفعيل مراقب الرسائل للإشعارات
  }

  // --- مراقب المستخدمين وقائمة الشات ---
  function startListeningUsers() {
    onSnapshot(collection(db, 'users'), snap => {
      allUsers = [];
      snap.forEach(d => { if (d.id !== myId) allUsers.push(d.data()); });
      renderUsers();
    });
  }

  function renderUsers() {
    const list = document.getElementById('usersList');
    list.innerHTML = '';
    allUsers.forEach(u => {
      const isUnread = unreadCounts[u.id] > 0;
      const item = document.createElement('div');
      item.className = `user-item ${activeUserId === u.id ? 'active' : ''}`;
      item.innerHTML = `
        <div class="avatar">
          ${u.avatar ? `<img src="${u.avatar}">` : `<span>${u.name[0]}</span>`}
          ${u.online ? '<div class="online-ring"></div>' : ''}
        </div>
        <div style="flex:1">
          <div style="color:var(--text); font-size:14px; font-weight:${isUnread?'700':'400'}">${u.name}</div>
          <div style="color:var(--text2); font-size:12px">${u.online ? 'نشط الآن' : 'غير متصل'}</div>
        </div>
        ${isUnread ? `<div class="unread-badge">${unreadCounts[u.id]}</div>` : ''}
      `;
      item.onclick = () => {
        unreadCounts[u.id] = 0; // تصفير العداد عند الفتح
        openChat(u);
        renderUsers();
      };
      list.appendChild(item);
    });
  }

  // --- ميزة الإشعارات والعداد (نفس إنستغرام) ---
  function startGlobalListener() {
    // نراقب كل المحادثات التي يكون المستخدم طرفاً فيها
    allUsers.forEach(user => {
      const chatId = [myId, user.id].sort().join('__');
      const q = query(collection(db, 'chats', chatId, 'messages'), orderBy('timestamp', 'desc'));
      
      // استماع لآخر رسالة فقط
      onSnapshot(q, snap => {
        if (snap.empty) return;
        const lastMsg = snap.docs[0].data();
        
        // إذا كانت الرسالة من الطرف الآخر وليست مني، والوقت حديث جداً
        if (lastMsg.senderId !== myId && lastMsg.timestamp) {
            const msgTime = lastMsg.timestamp.toDate().getTime();
            if (Date.now() - msgTime < 3000 && activeUserId !== user.id) {
                unreadCounts[user.id] = (unreadCounts[user.id] || 0) + 1;
                showNotification(user.name, lastMsg.text);
                renderUsers();
                playNotifSound();
            }
        }
      });
    });
  }

  function showNotification(sender, text) {
    const toast = document.createElement('div');
    toast.className = 'push-notif';
    toast.innerHTML = `
      <div style="font-size:13px">
        <b style="color:var(--online)">${sender}</b><br>
        <span style="color:var(--text)">${text.substring(0,30)}...</span>
      </div>
    `;
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 4000);
    toast.onclick = () => {
        const user = allUsers.find(u => u.name === sender);
        if(user) openChat(user);
        toast.remove();
    };
  }

  function playNotifSound() {
    const audio = new Audio('https://assets.mixkit.co/active_storage/sfx/2357/2357-preview.mp3');
    audio.play().catch(()=>{});
  }

  // --- إدارة الدردشة ---
  async function openChat(user) {
    activeUserId = user.id;
    document.getElementById('emptyChat').style.display = 'none';
    document.getElementById('chatView').style.display = 'flex';
    document.getElementById('chatArea').classList.remove('hidden');
    if(window.innerWidth < 640) document.getElementById('sidebar').classList.add('hidden');
    
    document.getElementById('chatName').textContent = user.name;
    document.getElementById('chatAvatar').innerHTML = user.avatar ? `<img src="${user.avatar}" style="width:100%; border-radius:50%">` : user.name[0];
    
    if (unsubMessages) unsubMessages();
    const chatId = [myId, activeUserId].sort().join('__');
    const q = query(collection(db, 'chats', chatId, 'messages'), orderBy('timestamp'));
    
    unsubMessages = onSnapshot(q, snap => {
      const box = document.getElementById('messages');
      box.innerHTML = '';
      snap.forEach(d => {
        const m = d.data();
        const row = document.createElement('div');
        row.className = 'msg-row ' + (m.senderId === myId ? 'me' : 'them');
        row.innerHTML = `<div class="bubble ${m.senderId === myId ? 'me' : 'them'}">${m.text}</div>`;
        box.appendChild(row);
      });
      box.scrollTop = box.scrollHeight;
    });
  }

  window.sendMsg = async function() {
    const inp = document.getElementById('msgInput');
    const text = inp.value.trim();
    if (!text || !activeUserId) return;
    
    const chatId = [myId, activeUserId].sort().join('__');
    inp.value = '';
    document.getElementById('sendBtn').style.display = 'none';
    
    await addDoc(collection(db, 'chats', chatId, 'messages'), {
      text, senderId: myId, timestamp: serverTimestamp()
    });
  }

  // إظهار زر الإرسال عند الكتابة
  document.getElementById('msgInput').oninput = function() {
    document.getElementById('sendBtn').style.display = this.value.trim() ? 'block' : 'none';
  };

  document.getElementById('backBtn').onclick = () => {
    document.getElementById('chatArea').classList.add('hidden');
    document.getElementById('sidebar').classList.remove('hidden');
    activeUserId = null;
  };

  // رفع الصورة في تسجيل الدخول
  document.getElementById('loginAvatarInput').onchange = (e) => {
    const reader = new FileReader();
    reader.onload = (ev) => {
      document.getElementById('loginAvatarPreview').src = ev.target.result;
      document.getElementById('loginAvatarPreview').style.display = 'block';
      document.getElementById('loginAvatarIcon').style.display = 'none';
    };
    reader.readAsDataURL(e.target.files[0]);
  };

</script>
</body>
</html>
