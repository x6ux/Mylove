<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Instagram • Direct</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #000;
      --border: #262626;
      --text: #fafafa;
      --text-muted: #a8a8a8;
      --accent: #0095f6;
      --bubble-other: #262626;
      --hover: #121212;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      -webkit-font-smoothing: antialiased;
      overflow: hidden;
    }

    /* ---------- Username overlay ---------- */
    .overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.85);
      backdrop-filter: blur(8px);
      display: flex; align-items: center; justify-content: center;
      z-index: 999;
    }
    .overlay-card {
      background: #121212;
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 32px;
      width: 90%; max-width: 380px;
      text-align: center;
    }
    .overlay-card h2 {
      font-size: 22px; font-weight: 600; margin-bottom: 8px;
      background: linear-gradient(45deg, #feda75, #fa7e1e, #d62976, #962fbf, #4f5bd5);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .overlay-card p { color: var(--text-muted); font-size: 14px; margin-bottom: 20px; }
    .overlay-card input {
      width: 100%;
      background: #1a1a1a;
      border: 1px solid var(--border);
      color: var(--text);
      padding: 12px 14px;
      border-radius: 8px;
      font-size: 14px;
      outline: none;
      margin-bottom: 14px;
      font-family: inherit;
    }
    .overlay-card input:focus { border-color: #555; }
    .overlay-card button {
      width: 100%;
      background: var(--accent);
      border: none; color: white;
      padding: 12px;
      border-radius: 8px;
      font-size: 14px; font-weight: 600;
      cursor: pointer;
      font-family: inherit;
    }
    .overlay-card button:hover { opacity: 0.9; }

    /* ---------- App layout ---------- */
    .app {
      display: grid;
      grid-template-columns: 72px 397px 1fr;
      height: 100vh;
      max-width: 1400px;
      margin: 0 auto;
      border-left: 1px solid var(--border);
      border-right: 1px solid var(--border);
    }

    /* ---------- Left rail ---------- */
    .rail {
      border-right: 1px solid var(--border);
      padding: 8px 12px;
      display: flex; flex-direction: column;
      gap: 8px;
    }
    .rail-logo { height: 92px; display: flex; align-items: center; justify-content: center; font-size: 24px; }
    .rail-item {
      display: flex; align-items: center; justify-content: center;
      width: 48px; height: 48px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 22px;
      transition: background 0.15s;
    }
    .rail-item:hover, .rail-item.active { background: var(--hover); }

    /* ---------- Inbox ---------- */
    .inbox { border-right: 1px solid var(--border); display: flex; flex-direction: column; min-width: 0; }
    .inbox-header {
      padding: 36px 24px 18px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .inbox-header h1 {
      font-size: 20px; font-weight: 700;
      display: flex; align-items: center; gap: 6px;
    }
    .inbox-header i.fa-chevron-down { font-size: 12px; }
    .inbox-header .pen { font-size: 22px; cursor: pointer; }
    .inbox-tabs { display: flex; padding: 18px 24px 8px; justify-content: space-between; }
    .inbox-tabs span:first-child { font-weight: 600; font-size: 15px; }
    .inbox-tabs span:last-child { color: var(--text-muted); font-size: 14px; cursor: pointer; }

    .chat-list { flex: 1; overflow-y: auto; padding: 8px 0; }
    .chat-list::-webkit-scrollbar { width: 0; }
    .chat-item {
      display: flex; align-items: center;
      padding: 8px 24px;
      cursor: pointer;
      gap: 12px;
      transition: background 0.15s;
    }
    .chat-item:hover { background: var(--hover); }
    .chat-item.active { background: #1a1a1a; }

    .avatar {
      width: 56px; height: 56px;
      border-radius: 50%;
      background: linear-gradient(45deg, #feda75, #fa7e1e, #d62976, #962fbf, #4f5bd5);
      display: flex; align-items: center; justify-content: center;
      font-weight: 600; font-size: 18px; color: #fff;
      flex-shrink: 0; position: relative;
    }
    .avatar.sm { width: 40px; height: 40px; font-size: 14px; }
    .avatar.lg { width: 96px; height: 96px; font-size: 28px; }
    .avatar .dot {
      position: absolute; bottom: 2px; right: 2px;
      width: 14px; height: 14px;
      background: #22c55e;
      border: 2px solid var(--bg);
      border-radius: 50%;
    }
    .chat-meta { display: flex; flex-direction: column; min-width: 0; flex: 1; }
    .chat-meta .name { font-size: 14px; font-weight: 500; }
    .chat-meta .preview {
      font-size: 14px; color: var(--text-muted);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      margin-top: 2px;
    }

    /* ---------- Conversation ---------- */
    .conv { display: flex; flex-direction: column; min-width: 0; background: var(--bg); }
    .conv-header {
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
      flex-shrink: 0;
    }
    .conv-header-left { display: flex; align-items: center; gap: 12px; }
    .conv-header-left .name { font-weight: 600; font-size: 16px; }
    .conv-header-right { display: flex; gap: 22px; font-size: 22px; color: var(--text); }
    .conv-header-right i { cursor: pointer; }

    .conv-empty {
      flex: 1;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 16px;
      text-align: center;
      padding: 0 40px;
    }
    .conv-empty .ring {
      width: 96px; height: 96px;
      border: 2px solid var(--text);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 42px;
    }
    .conv-empty h2 { font-size: 20px; font-weight: 400; }
    .conv-empty p { color: var(--text-muted); font-size: 14px; }
    .conv-empty button {
      margin-top: 8px;
      background: var(--accent);
      border: none; color: white;
      padding: 8px 18px;
      border-radius: 8px;
      font-weight: 600; font-size: 14px;
      cursor: pointer;
      font-family: inherit;
    }

    .conv-meta {
      display: flex; flex-direction: column;
      align-items: center; gap: 8px;
      padding: 28px 0 36px;
    }
    .conv-meta .name { font-weight: 600; font-size: 20px; margin-top: 14px; }
    .conv-meta .sub { color: var(--text-muted); font-size: 14px; }
    .conv-meta .view-profile {
      margin-top: 12px;
      background: #262626;
      color: #fff;
      border: none;
      padding: 7px 16px;
      border-radius: 8px;
      font-size: 14px; font-weight: 600;
      cursor: pointer;
      font-family: inherit;
    }

    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 0 20px 16px;
      display: flex; flex-direction: column;
      gap: 4px;
    }
    .messages::-webkit-scrollbar { width: 0; }

    .msg-row {
      display: flex; align-items: flex-end;
      gap: 8px;
      max-width: 70%;
    }
    .msg-row.mine { margin-left: auto; flex-direction: row-reverse; }
    .msg-row + .msg-row { margin-top: 2px; }
    .msg-row.spaced { margin-top: 12px; }

    .bubble {
      padding: 9px 14px;
      border-radius: 22px;
      font-size: 14px;
      line-height: 1.35;
      word-wrap: break-word;
      max-width: 100%;
    }
    .msg-row.other .bubble { background: var(--bubble-other); color: var(--text); }
    .msg-row.mine .bubble {
      background: linear-gradient(45deg, #4f5bd5, #962fbf, #d62976, #fa7e1e);
      color: #fff;
    }

    .msg-time {
      text-align: center;
      color: var(--text-muted);
      font-size: 12px;
      margin: 16px 0 8px;
    }

    /* ---------- Composer ---------- */
    .composer {
      margin: 8px 20px 18px;
      border: 1px solid #363636;
      border-radius: 26px;
      display: flex; align-items: center;
      padding: 6px 6px 6px 16px;
      gap: 10px;
      flex-shrink: 0;
    }
    .composer i.left { font-size: 22px; cursor: pointer; }
    .composer input {
      flex: 1;
      background: transparent;
      border: none;
      color: var(--text);
      outline: none;
      font-size: 14px;
      padding: 10px 4px;
      font-family: inherit;
    }
    .composer .icons { display: flex; gap: 14px; align-items: center; padding-right: 10px; }
    .composer .icons i { font-size: 20px; cursor: pointer; color: var(--text); }
    .composer .send-btn {
      background: none; border: none;
      color: var(--accent);
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
      padding: 8px 4px;
      font-family: inherit;
      display: none;
    }
    .composer.has-text .icons { display: none; }
    .composer.has-text .send-btn { display: block; }

    .inbox-empty {
      padding: 40px 24px;
      text-align: center;
      color: var(--text-muted);
      font-size: 14px;
    }

    @media (max-width: 900px) {
      .app { grid-template-columns: 60px 1fr; }
      .conv { display: none; }
      .app.show-conv { grid-template-columns: 60px 1fr; }
      .app.show-conv .inbox { display: none; }
      .app.show-conv .conv { display: flex; }
    }
  </style>
</head>
<body>

  <div class="overlay" id="login-overlay">
    <div class="overlay-card">
      <h2>Instagram Direct</h2>
      <p>Enter a username to start chatting</p>
      <input id="username-input" type="text" placeholder="your.username" maxlength="20" />
      <button id="join-btn">Continue</button>
    </div>
  </div>

  <div class="app" id="app">
    <aside class="rail">
      <div class="rail-item active"><i class="fa-regular fa-paper-plane"></i></div>
    </aside>

    <section class="inbox">
      <div class="inbox-header">
        <h1 id="me-username">username <i class="fa-solid fa-chevron-down"></i></h1>
        <i class="fa-regular fa-pen-to-square pen" id="pen-btn"></i>
      </div>
      <div class="inbox-tabs">
        <span>Messages</span>
        <span>Requests</span>
      </div>
      <div class="chat-list" id="chat-list">
        <div class="inbox-empty">Loading conversations…</div>
      </div>
    </section>

    <section class="conv" id="conv">
      <div class="conv-empty" id="conv-empty">
        <div class="ring"><i class="fa-regular fa-paper-plane"></i></div>
        <h2>Your messages</h2>
        <p>Send a message to start a chat.</p>
        <button id="new-chat-btn">Send message</button>
      </div>

      <div id="conv-active" style="display:none; flex:1; flex-direction:column; min-height:0;">
        <div class="conv-header">
          <div class="conv-header-left">
            <div class="avatar sm" id="conv-avatar">A</div>
            <div><div class="name" id="conv-name">username</div></div>
          </div>
          <div class="conv-header-right">
            <i class="fa-solid fa-phone"></i>
            <i class="fa-solid fa-video"></i>
            <i class="fa-solid fa-circle-info"></i>
          </div>
        </div>

        <div class="messages" id="messages">
          <div class="conv-meta">
            <div class="avatar lg" id="conv-meta-avatar">A</div>
            <div class="name" id="conv-meta-name">username</div>
            <div class="sub">Instagram</div>
            <button class="view-profile">View profile</button>
          </div>
        </div>

        <form class="composer" id="composer" autocomplete="off">
          <i class="fa-regular fa-face-smile left"></i>
          <input id="msg-input" type="text" placeholder="Message…" />
          <div class="icons">
            <i class="fa-regular fa-images"></i>
            <i class="fa-regular fa-heart"></i>
          </div>
          <button type="submit" class="send-btn">Send</button>
        </form>
      </div>
    </section>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import {
      getFirestore, collection, doc, setDoc, onSnapshot, addDoc,
      query, orderBy, serverTimestamp, getDoc, where
    } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCGESu1mlPYGthb3ibL6PdD5HpgdjaleF8",
      authDomain: "myloves-ce43d.firebaseapp.com",
      projectId: "myloves-ce43d",
      storageBucket: "myloves-ce43d.firebasestorage.app",
      messagingSenderId: "547760347659",
      appId: "1:547760347659:web:943ef1d86577549ab9c50e"
    };

    const firebaseApp = initializeApp(firebaseConfig);
    const db = getFirestore(firebaseApp);

    // ---------- State ----------
    let me = localStorage.getItem("ig_username") || "";
    let activeChatId = null;
    let activeOther = null;
    let unsubMessages = null;
    let unsubChats = null;
    let localChatsCache = [];

    const $ = (id) => document.getElementById(id);
    const loginOverlay   = $("login-overlay");
    const usernameInput  = $("username-input");
    const joinBtn        = $("join-btn");
    const meUsernameEl   = $("me-username");
    const chatListEl     = $("chat-list");
    const convEmpty      = $("conv-empty");
    const convActive     = $("conv-active");
    const convNameEl     = $("conv-name");
    const convAvatarEl   = $("conv-avatar");
    const convMetaAvatar = $("conv-meta-avatar");
    const convMetaName   = $("conv-meta-name");
    const messagesEl     = $("messages");
    const composer       = $("composer");
    const msgInput       = $("msg-input");
    const newChatBtn     = $("new-chat-btn");
    const penBtn         = $("pen-btn");

    const initial   = (n) => (n || "?").trim().charAt(0).toUpperCase();
    const chatIdFor = (a, b) => [a, b].sort().join("__");

    async function registerUser(name) {
      try {
        await setDoc(doc(db, "users", name), {
          username: name,
          createdAt: serverTimestamp()
        }, { merge: true });
      } catch(e) {
        console.warn("User registration note/error:", e.message);
      }
    }

    // ---------- Login ----------
    joinBtn.addEventListener("click", joinChat);
    usernameInput.addEventListener("keydown", (e) => { if (e.key === "Enter") joinChat(); });

    async function joinChat() {
      const raw = usernameInput.value.trim().toLowerCase().replace(/[^a-z0-9._]/g, "");
      if (!raw || raw.length < 2) {
        usernameInput.focus();
        usernameInput.style.borderColor = "#ed4956";
        return;
      }
      me = raw;
      localStorage.setItem("ig_username", me);
      loginOverlay.style.display = "none";
      meUsernameEl.childNodes[0].nodeValue = me + " ";
      await registerUser(me);
      subscribeToChats();
    }

    // Auto-init if local storage handle exists
    if (me) {
      loginOverlay.style.display = "none";
      meUsernameEl.childNodes[0].nodeValue = me + " ";
      registerUser(me);
      subscribeToChats();
    } else {
      usernameInput.focus();
    }

    // ---------- Chat list ----------
    function subscribeToChats() {
      if (unsubChats) unsubChats();
      const q = query(collection(db, "chats"), where("members", "array-contains", me));
      unsubChats = onSnapshot(q, (snap) => {
        const chats = [];
        snap.forEach((d) => chats.push({ id: d.id, ...d.data() }));
        chats.sort((a, b) => (b.updatedAt?.seconds || 0) - (a.updatedAt?.seconds || 0));
        localChatsCache = chats;
        renderChatList(chats);
      }, (err) => {
        console.error("Chats access problem:", err);
        chatListEl.innerHTML = `<div class="inbox-empty">Could not load chats.<br/>Check your Firestore Rules configuration.</div>`;
      });
    }

    function renderChatList(chats) {
      if (!chats.length) {
        chatListEl.innerHTML = `<div class="inbox-empty">No messages yet.<br/>Tap the pencil to start a chat.</div>`;
        return;
      }
      chatListEl.innerHTML = "";
      chats.forEach((c) => {
        const other = (c.members || []).find((m) => m !== me) || "?";
        const row = document.createElement("div");
        row.className = "chat-item" + (c.id === activeChatId ? " active" : "");
        row.dataset.id = c.id;
        row.innerHTML = `
          <div class="avatar"><span>${initial(other)}</span><div class="dot"></div></div>
          <div class="chat-meta">
            <div class="name">${other}</div>
            <div class="preview">${escapeHTML(c.lastMessage || "Say hi 👋").slice(0, 40)}</div>
          </div>
        `;
        row.addEventListener("click", () => openChat(other));
        chatListEl.appendChild(row);
      });
    }

    // ---------- Start new chat ----------
    async function startNewChat() {
      const target = prompt("Send message to (username):");
      if (!target) return;
      const t = target.trim().toLowerCase().replace(/[^a-z0-9._]/g, "");
      if (!t || t === me) return;
      await registerUser(t);
      await openChat(t);
    }
    newChatBtn.addEventListener("click", startNewChat);
    penBtn.addEventListener("click", startNewChat);

    // ---------- Open chat ----------
    async function openChat(otherUsername) {
      activeOther = otherUsername;
      activeChatId = chatIdFor(me, otherUsername);

      // Instantly update active CSS across list items without waiting for DB cycle
      document.querySelectorAll('.chat-item').forEach(el => {
        if(el.dataset.id === activeChatId) el.classList.add('active');
        else el.classList.remove('active');
      });

      try {
        await setDoc(doc(db, "chats", activeChatId), {
          members: [me, otherUsername].sort(),
          updatedAt: serverTimestamp()
        }, { merge: true });
      } catch(e) {
        console.warn("Chat session container note:", e.message);
      }

      convNameEl.textContent = otherUsername;
      convAvatarEl.textContent = initial(otherUsername);
      convMetaAvatar.textContent = initial(otherUsername);
      convMetaName.textContent = otherUsername;

      convEmpty.style.display = "none";
      convActive.style.display = "flex";
      document.getElementById("app").classList.add("show-conv");

      subscribeToMessages();
      msgInput.focus();
    }

    function subscribeToMessages() {
      if (unsubMessages) unsubMessages();
      const msgsRef = collection(db, "chats", activeChatId, "messages");
      const q = query(msgsRef, orderBy("createdAt", "asc"));
      unsubMessages = onSnapshot(q, (snap) => {
        const msgs = [];
        snap.forEach((d) => msgs.push({ id: d.id, ...d.data() }));
        renderMessages(msgs);
      });
    }

    function renderMessages(msgs) {
      const metaHTML = messagesEl.querySelector(".conv-meta")?.outerHTML || "";
      messagesEl.innerHTML = metaHTML;

      let lastDay = null;
      let lastSender = null;
      msgs.forEach((m) => {
        if (m.createdAt?.toDate) {
          const d = m.createdAt.toDate();
          const day = d.toDateString();
          if (day !== lastDay) {
            const t = document.createElement("div");
            t.className = "msg-time";
            t.textContent = formatTimestamp(d);
            messagesEl.appendChild(t);
            lastDay = day;
            lastSender = null;
          }
        }
        const mine = m.from === me;
        const spaced = lastSender && lastSender !== m.from;
        const row = document.createElement("div");
        row.className = `msg-row ${mine ? "mine" : "other"} ${spaced ? "spaced" : ""}`;
        row.innerHTML = `<div class="bubble">${escapeHTML(m.text)}</div>`;
        messagesEl.appendChild(row);
        lastSender = m.from;
      });

      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function formatTimestamp(d) {
      const now = new Date();
      const sameDay = d.toDateString() === now.toDateString();
      const time = d.toLocaleTimeString([], { hour: "numeric", minute: "2-digit" });
      if (sameDay) return `Today ${time}`;
      return `${d.toLocaleDateString([], { weekday: "short", month: "short", day: "numeric" })} ${time}`;
    }

    function escapeHTML(s) {
      return (s || "").replace(/[&<>"']/g, (c) =>
        ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c])
      );
    }

    // ---------- Composer UI Sync ----------
    const toggleInputLayout = () => {
      if (msgInput.value.trim().length > 0) composer.classList.add("has-text");
      else composer.classList.remove("has-text");
    };
    msgInput.addEventListener("input", toggleInputLayout);
    msgInput.addEventListener("change", toggleInputLayout);

    composer.addEventListener("submit", async (e) => {
      e.preventDefault();
      const text = msgInput.value.trim();
      if (!text || !activeChatId) return;
      msgInput.value = "";
      composer.classList.remove("has-text");

      const msgsRef = collection(db, "chats", activeChatId, "messages");
      
      try {
        await addDoc(msgsRef, {
          text,
          from: me,
          to: activeOther,
          createdAt: serverTimestamp()
        });

        await setDoc(doc(db, "chats", activeChatId), {
          members: [me, activeOther].sort(),
          lastMessage: text,
          lastFrom: me,
          updatedAt: serverTimestamp()
        }, { merge: true });
      } catch(err) {
        console.error("Message sending breakdown: ", err);
      }
    });
  </script>
</body>
</html>
